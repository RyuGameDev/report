<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keluhan · Red Futuristik</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efek futuristik: garis berjalan (scanline) dan glow ala sebelumnya */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 0, 0, 0.03) 0px, rgba(0,0,0,0.5) 1px, transparent 2px);
            pointer-events: none;
            z-index: 999;
        }
        .glow-text {
            text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000;
        }
        .glow-border {
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000 inset;
        }
        .field-transition {
            transition: all 0.3s ease;
        }
        /* Custom scrollbar */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1a0000;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 8px;
        }
        /* Style untuk Choices.js agar sesuai tema merah */
        .choices__inner {
            background: black !important;
            color: white !important;
            border: 2px solid #ff0000 !important;
            border-radius: 0.75rem !important;
            font-size: 1rem !important;
        }
        .choices__list--dropdown, .choices__list[aria-expanded] {
            background-color: black !important;
            border: 2px solid #ff0000 !important;
            color: white !important;
        }
        .choices__item--selectable {
            background-color: black !important;
            color: white !important;
        }
        .choices__item--selectable.is-highlighted {
            background-color: #d40000 !important;
            color: white !important;
        }
        .choices__placeholder {
            opacity: 0.7;
            color: #ff0000 !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0a0000] via-[#1a0000] to-[#2a0000] min-h-screen flex items-center justify-center p-4 font-mono">

    <div class="bg-black/80 backdrop-blur-md rounded-3xl shadow-2xl shadow-red-600/50 w-full max-w-2xl p-6 md:p-8 border border-red-600/50 relative overflow-hidden">
        <!-- Efek garis merah berjalan di pinggir (futuristik) -->
        <div class="absolute -inset-1 bg-gradient-to-r from-red-600 via-red-400 to-red-600 blur-2xl opacity-20 animate-pulse"></div>
        
        <!-- Header dengan avatar ala web contoh -->
        <div class="text-center mb-8 relative z-10">
            <div class="flex justify-center mb-3">
                <img src="https://files.catbox.moe/5izf6o.jpeg" alt="Avatar" class="w-20 h-20 rounded-full border-3 border-red-600 shadow-[0_0_20px_red] object-cover">
            </div>
            <h1 class="text-4xl font-bold text-white glow-text tracking-widest">LAPORAN KELUHAN</h1>
            <p class="text-red-400/80 mt-1 text-sm uppercase tracking-wider">Pilih produk & sampaikan kendala</p>
        </div>

        <form id="complaintForm" class="space-y-5 relative z-10">
            <!-- Dropdown Produk (akan diinisialisasi dengan Choices.js) -->
            <div id="product-select-container"></div>

            <!-- Container Field Dinamis -->
            <div id="dynamic-fields" class="space-y-4">
                <!-- Fields untuk CloneBot -->
                <div id="clonebot-fields" class="space-y-4 hidden field-transition">
                    <input type="text" id="botNumber" name="botNumber" placeholder="Nomor Bot Bermasalah (contoh: 628123456789)" class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition placeholder:text-red-800 shadow-[0_0_5px_red]">
                    <select id="server" name="server" class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition shadow-[0_0_5px_red]">
                        <option value="1" class="bg-black">Server 1</option>
                        <option value="2" class="bg-black">Server 2</option>
                        <option value="3" class="bg-black">Server 3</option>
                        <option value="4" class="bg-black">Server 4</option>
                    </select>
                    <textarea id="complaintClone" rows="4" placeholder="Tulis keluhan Anda dengan detail..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition resize-none placeholder:text-red-800 shadow-[0_0_5px_red]"></textarea>
                </div>

                <!-- Fields untuk SewaBot -->
                <div id="sewabot-fields" class="space-y-4 hidden field-transition">
                    <input type="url" id="groupLink" name="groupLink" placeholder="Link Group (https://t.me/...)" class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition placeholder:text-red-800 shadow-[0_0_5px_red]">
                    <textarea id="complaintSewa" rows="4" placeholder="Tulis keluhan Anda dengan detail..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition resize-none placeholder:text-red-800 shadow-[0_0_5px_red]"></textarea>
                </div>

                <!-- Fields untuk Lainnya -->
                <div id="lainnya-fields" class="space-y-4 hidden field-transition">
                    <textarea id="complaintLainnya" rows="5" placeholder="Tulis keluhan atau pesan Anda..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition resize-none placeholder:text-red-800 shadow-[0_0_5px_red]"></textarea>
                </div>
            </div>

            <!-- Tombol Kirim -->
            <button type="submit" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_red] hover:bg-red-700 hover:shadow-[0_0_30px_red] transform hover:scale-[1.02] transition duration-200 text-lg uppercase tracking-widest flex items-center justify-center gap-2 border border-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.5 3.5L2.5 10.5L8.5 13.5L13.5 21.5L20.5 3.5Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
                </svg>
                Kirim via WhatsApp
            </button>
        </form>

        <!-- Social Icons & Copyright ala web contoh -->
        <div class="social-icons flex justify-center gap-5 mt-8 relative z-10">
            <a href="https://whatsapp.com/channel/0029VaMW4ny4inoqPNCpQJ2C" class="social-icon w-11 h-11 rounded-full bg-white/10 flex items-center justify-center text-white text-2xl border border-red-500/50 hover:transform hover:-translate-y-1 hover:shadow-[0_5px_15px_rgba(255,0,0,0.4)] transition-all" target="_blank" title="WhatsApp">
                <i class='bx bxl-whatsapp'></i>
            </a>
            <a href="https://github.com/RyuGameDev" class="social-icon w-11 h-11 rounded-full bg-white/10 flex items-center justify-center text-white text-2xl border border-red-500/50 hover:transform hover:-translate-y-1 hover:shadow-[0_5px_15px_rgba(255,0,0,0.4)] transition-all" target="_blank" title="GitHub">
                <i class='bx bxl-github'></i>
            </a>
            <a href="https://instagram.com/yonkounoryu" class="social-icon w-11 h-11 rounded-full bg-white/10 flex items-center justify-center text-white text-2xl border border-red-500/50 hover:transform hover:-translate-y-1 hover:shadow-[0_5px_15px_rgba(255,0,0,0.4)] transition-all" target="_blank" title="Instagram">
                <i class='bx bxl-instagram'></i>
            </a>
        </div>
        <div class="copyright text-center text-xs text-red-600/50 mt-3 relative z-10">
            &copy; 2023 Ryudev. All rights reserved.
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <script>
        (function() {
            // Inisialisasi Choices.js untuk dropdown produk
            const productContainer = document.getElementById('product-select-container');
            productContainer.innerHTML = `
                <select id="product" name="product" placeholder="Pilih Produk">
                    <option value="" disabled selected>-- Pilih Produk --</option>
                    <option value="clonebot">CloneBot</option>
                    <option value="sewabot">SewaBot</option>
                    <option value="lainnya">Lainnya</option>
                </select>
            `;
            
            const productSelect = document.getElementById('product');
            const choices = new Choices(productSelect, {
                searchEnabled: false,
                itemSelectText: '',
                shouldSort: false,
                placeholderValue: 'Pilih Produk',
                allowHTML: false,
            });

            // Elemen field group
            const clonebotFields = document.getElementById('clonebot-fields');
            const sewabotFields = document.getElementById('sewabot-fields');
            const lainnyaFields = document.getElementById('lainnya-fields');
            const form = document.getElementById('complaintForm');

            // Referensi input
            const botNumber = document.getElementById('botNumber');
            const server = document.getElementById('server');
            const complaintClone = document.getElementById('complaintClone');
            const groupLink = document.getElementById('groupLink');
            const complaintSewa = document.getElementById('complaintSewa');
            const complaintLainnya = document.getElementById('complaintLainnya');

            // Fungsi toggle field
            function toggleFields() {
                const selected = productSelect.value;

                clonebotFields.classList.add('hidden');
                sewabotFields.classList.add('hidden');
                lainnyaFields.classList.add('hidden');

                botNumber.required = false;
                server.required = false;
                complaintClone.required = false;
                groupLink.required = false;
                complaintSewa.required = false;
                complaintLainnya.required = false;

                if (selected === 'clonebot') {
                    clonebotFields.classList.remove('hidden');
                    botNumber.required = true;
                    server.required = true;
                    complaintClone.required = true;
                } else if (selected === 'sewabot') {
                    sewabotFields.classList.remove('hidden');
                    groupLink.required = true;
                    complaintSewa.required = true;
                } else if (selected === 'lainnya') {
                    lainnyaFields.classList.remove('hidden');
                    complaintLainnya.required = true;
                }
            }

            productSelect.addEventListener('change', toggleFields);
            toggleFields(); // tidak ada default, semua hidden

            // Handle submit
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const selected = productSelect.value;
                if (!selected) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Produk Belum Dipilih',
                        text: 'Silakan pilih produk terlebih dahulu!',
                        confirmButtonColor: '#ff0000'
                    });
                    return;
                }

                let isValid = false;
                if (selected === 'clonebot') {
                    if (botNumber.value.trim() && complaintClone.value.trim()) isValid = true;
                } else if (selected === 'sewabot') {
                    if (groupLink.value.trim() && complaintSewa.value.trim()) isValid = true;
                } else if (selected === 'lainnya') {
                    if (complaintLainnya.value.trim()) isValid = true;
                }

                if (!isValid) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Data Belum Lengkap',
                        text: 'Harap isi semua field yang diperlukan!',
                        confirmButtonColor: '#ff0000'
                    });
                    return;
                }

                Swal.fire({
                    title: 'Konfirmasi Laporan',
                    html: 'Pastikan data yang Anda masukkan sudah benar.<br>Laporan akan dikirim ke admin via WhatsApp.',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Ya, Kirim!',
                    cancelButtonText: 'Batal',
                    confirmButtonColor: '#28a745',
                    cancelButtonColor: '#d33'
                }).then((result) => {
                    if (result.isConfirmed) {
                        let message = '.owner';
                        const now = new Date();
                        const dateStr = now.toLocaleString('id-ID', { 
                            weekday: 'long', 
                            year: 'numeric', 
                            month: 'long', 
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        if (selected === 'clonebot') {
                            message += `\n\n━━━ *LAPORAN CLONEBOT* ━━━`;
                            message += `\n🤖 *Nomor Bot* : ${botNumber.value.trim()}`;
                            message += `\n🖥️ *Server*    : Server ${server.value}`;
                            message += `\n📝 *Keluhan*   :\n_${complaintClone.value.trim()}_`;
                        } else if (selected === 'sewabot') {
                            message += `\n\n━━━ *LAPORAN SEWABOT* ━━━`;
                            message += `\n🔗 *Link Group* : ${groupLink.value.trim()}`;
                            message += `\n📝 *Keluhan*    :\n_${complaintSewa.value.trim()}_`;
                        } else if (selected === 'lainnya') {
                            message += `\n\n━━━ *LAPORAN LAINNYA* ━━━`;
                            message += `\n📝 *Isi Laporan* :\n_${complaintLainnya.value.trim()}_`;
                        }

                        message += `\n\n📅 *Dilaporkan pada* : ${dateStr}`;
                        message += `\n━━━━━━━━━━━━━━━━━`;

                        const encodedMessage = encodeURIComponent(message);
                        const phoneNumber = '6285648640715';
                        const waUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;

                        Swal.fire({
                            title: 'Mengalihkan ke WhatsApp...',
                            text: 'Mohon tunggu sebentar',
                            allowOutsideClick: false,
                            allowEscapeKey: false,
                            didOpen: () => {
                                Swal.showLoading();
                                setTimeout(() => {
                                    window.open(waUrl, '_blank');
                                    Swal.close();
                                }, 1500);
                            }
                        });
                    }
                });
            });
        })();
    </script>
</body>
</html>
