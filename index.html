<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keluhan · Dark Mode</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi halus */
        .field-transition {
            transition: all 0.3s ease;
        }
        /* Kustom scrollbar untuk textarea (opsional) */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #2d2d3a;
            border-radius: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #6b21a5;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0f0f17] via-[#1a1a2e] to-[#16213e] min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-[#1e1e2f]/90 backdrop-blur-md rounded-3xl shadow-2xl shadow-indigo-500/20 w-full max-w-2xl p-6 md:p-8 border border-indigo-500/30">
        <!-- Header dengan ikon -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-indigo-900/50 rounded-full mb-3 border border-indigo-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">Laporan Keluhan</h1>
            <p class="text-indigo-200/70 mt-1">Pilih produk, sampaikan kendala</p>
        </div>

        <form id="complaintForm" class="space-y-5">
            <!-- Dropdown Produk -->
            <div class="relative">
                <label class="block text-sm font-semibold text-indigo-200 mb-1">Pilih Produk</label>
                <select id="product" name="product" class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition appearance-none">
                    <option value="clonebot" class="bg-[#2d2d3a]">CloneBot</option>
                    <option value="sewabot" class="bg-[#2d2d3a]">SewaBot</option>
                    <option value="lainnya" class="bg-[#2d2d3a]">Lainnya</option>
                </select>
                <div class="pointer-events-none absolute right-3 top-10 text-indigo-300">
                    ▼
                </div>
            </div>

            <!-- Container Field Dinamis -->
            <div id="dynamic-fields" class="space-y-4">
                <!-- Fields untuk CloneBot -->
                <div id="clonebot-fields" class="space-y-4 field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-indigo-200 mb-1">Nomor Bot Bermasalah</label>
                        <input type="text" id="botNumber" name="botNumber" placeholder="Contoh: 628123456789" class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition placeholder:text-indigo-200/40">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-indigo-200 mb-1">Pilih Server</label>
                        <select id="server" name="server" class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition">
                            <option value="1" class="bg-[#2d2d3a]">Server 1</option>
                            <option value="2" class="bg-[#2d2d3a]">Server 2</option>
                            <option value="3" class="bg-[#2d2d3a]">Server 3</option>
                            <option value="4" class="bg-[#2d2d3a]">Server 4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-indigo-200 mb-1">Keluhan</label>
                        <textarea id="complaintClone" rows="4" placeholder="Tulis keluhan Anda dengan detail..." class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition resize-none placeholder:text-indigo-200/40"></textarea>
                    </div>
                </div>

                <!-- Fields untuk SewaBot (awalnya tersembunyi) -->
                <div id="sewabot-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-indigo-200 mb-1">Link Group</label>
                        <input type="url" id="groupLink" name="groupLink" placeholder="https://t.me/..." class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition placeholder:text-indigo-200/40">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-indigo-200 mb-1">Keluhan</label>
                        <textarea id="complaintSewa" rows="4" placeholder="Tulis keluhan Anda dengan detail..." class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition resize-none placeholder:text-indigo-200/40"></textarea>
                    </div>
                </div>

                <!-- Fields untuk Lainnya (hanya keluhan) -->
                <div id="lainnya-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-indigo-200 mb-1">Keluhan / Pesan</label>
                        <textarea id="complaintLainnya" rows="5" placeholder="Silakan tulis keluhan atau pesan Anda..." class="w-full bg-[#2d2d3a] border border-indigo-500/50 text-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition resize-none placeholder:text-indigo-200/40"></textarea>
                    </div>
                </div>
            </div>

            <!-- Tombol Kirim -->
            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-700/30 hover:shadow-indigo-600/50 transform hover:scale-[1.02] transition duration-200 text-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.5 3.5L2.5 10.5L8.5 13.5L13.5 21.5L20.5 3.5Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
                </svg>
                Kirim Laporan via WhatsApp
            </button>
        </form>

        <p class="text-xs text-center text-indigo-200/50 mt-6">* Data akan dikirim ke admin via WhatsApp. Pastikan data sudah benar.</p>
    </div>

    <script>
        (function() {
            // Ambil elemen DOM
            const productSelect = document.getElementById('product');
            const clonebotFields = document.getElementById('clonebot-fields');
            const sewabotFields = document.getElementById('sewabot-fields');
            const lainnyaFields = document.getElementById('lainnya-fields');
            const form = document.getElementById('complaintForm');

            // Referensi input
            const botNumber = document.getElementById('botNumber');
            const server = document.getElementById('server');
            const complaintClone = document.getElementById('complaintClone');
            const groupLink = document.getElementById('groupLink');
            const complaintSewa = document.getElementById('complaintSewa');
            const complaintLainnya = document.getElementById('complaintLainnya');

            // Fungsi toggle field berdasarkan produk yang dipilih
            function toggleFields() {
                const selected = productSelect.value;

                // Sembunyikan semua grup terlebih dahulu
                clonebotFields.classList.add('hidden');
                sewabotFields.classList.add('hidden');
                lainnyaFields.classList.add('hidden');

                // Reset required semua field
                botNumber.required = false;
                server.required = false;
                complaintClone.required = false;
                groupLink.required = false;
                complaintSewa.required = false;
                complaintLainnya.required = false;

                // Tampilkan grup yang sesuai dan set required
                if (selected === 'clonebot') {
                    clonebotFields.classList.remove('hidden');
                    botNumber.required = true;
                    server.required = true;
                    complaintClone.required = true;
                } else if (selected === 'sewabot') {
                    sewabotFields.classList.remove('hidden');
                    groupLink.required = true;
                    complaintSewa.required = true;
                } else if (selected === 'lainnya') {
                    lainnyaFields.classList.remove('hidden');
                    complaintLainnya.required = true;
                }
            }

            // Panggil pertama kali untuk set state awal (CloneBot aktif)
            toggleFields();

            // Event listener saat produk diubah
            productSelect.addEventListener('change', toggleFields);

            // Handle submit form
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const selected = productSelect.value;
                let message = '.owner'; // Awalan sesuai instruksi

                // Ambil tanggal dan waktu sekarang
                const now = new Date();
                const dateStr = now.toLocaleString('id-ID', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                if (selected === 'clonebot') {
                    const botVal = botNumber.value.trim();
                    const serverVal = server.value;
                    const complaintVal = complaintClone.value.trim();

                    if (!botVal || !complaintVal) {
                        alert('Harap isi nomor bot dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN CLONEBOT* ━━━`;
                    message += `\n🤖 *Nomor Bot* : ${botVal}`;
                    message += `\n🖥️ *Server*    : Server ${serverVal}`;
                    message += `\n📝 *Keluhan*   :\n_${complaintVal}_`;
                } 
                else if (selected === 'sewabot') {
                    const linkVal = groupLink.value.trim();
                    const complaintVal = complaintSewa.value.trim();

                    if (!linkVal || !complaintVal) {
                        alert('Harap isi link group dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN SEWABOT* ━━━`;
                    message += `\n🔗 *Link Group* : ${linkVal}`;
                    message += `\n📝 *Keluhan*    :\n_${complaintVal}_`;
                } 
                else if (selected === 'lainnya') {
                    const complaintVal = complaintLainnya.value.trim();

                    if (!complaintVal) {
                        alert('Harap isi keluhan/pesan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN LAINNYA* ━━━`;
                    message += `\n📝 *Isi Laporan* :\n_${complaintVal}_`;
                }

                // Tambahkan footer laporan
                message += `\n\n📅 *Dilaporkan pada* : ${dateStr}`;
                message += `\n━━━━━━━━━━━━━━━━━`;

                // Encode pesan untuk URL
                const encodedMessage = encodeURIComponent(message);

                // Nomor tujuan (tanpa tanda + atau spasi)
                const phoneNumber = '6285648640715';

                // Buat URL WhatsApp (menggunakan api.whatsapp.com agar lebih kompatibel)
                const waUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;

                // Buka di tab baru
                window.open(waUrl, '_blank');
            });
        })();
    </script>
</body>
</html>
