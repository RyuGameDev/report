<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keluhan · Futuristik Merah Hitam</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efek futuristik: garis berjalan (scanline) dan glow */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 0, 0, 0.03) 0px, rgba(0,0,0,0.5) 1px, transparent 2px);
            pointer-events: none;
            z-index: 999;
        }
        .glow-text {
            text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000;
        }
        .glow-border {
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000 inset;
        }
        .field-transition {
            transition: all 0.3s ease;
        }
        /* Kustom scrollbar */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1a0000;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0a0000] via-[#1a0000] to-[#2a0000] min-h-screen flex items-center justify-center p-4 font-mono">

    <div class="bg-black/80 backdrop-blur-md rounded-3xl shadow-2xl shadow-red-600/50 w-full max-w-2xl p-6 md:p-8 border border-red-600/50 relative overflow-hidden">
        <!-- Efek garis merah berjalan di pinggir -->
        <div class="absolute -inset-1 bg-gradient-to-r from-red-600 via-red-400 to-red-600 blur-2xl opacity-20 animate-pulse"></div>
        
        <!-- Header -->
        <div class="text-center mb-8 relative z-10">
            <div class="inline-block p-3 bg-black border-2 border-red-600 rounded-full mb-3 shadow-[0_0_20px_red]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white glow-text tracking-widest">LAPORAN KELUHAN</h1>
            <p class="text-red-400/80 mt-1 text-sm uppercase tracking-wider">Pilih produk & sampaikan kendala</p>
        </div>

        <form id="complaintForm" class="space-y-5 relative z-10">
            <!-- Dropdown Produk dengan placeholder -->
            <div class="relative">
                <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Produk</label>
                <select id="product" name="product" class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition appearance-none shadow-[0_0_10px_red]">
                    <option value="" disabled selected class="bg-black text-gray-500">-- Pilih Produk --</option>
                    <option value="clonebot" class="bg-black">CloneBot</option>
                    <option value="sewabot" class="bg-black">SewaBot</option>
                    <option value="lainnya" class="bg-black">Lainnya</option>
                </select>
                <div class="pointer-events-none absolute right-3 top-10 text-red-600">
                    ▼
                </div>
            </div>

            <!-- Container Field Dinamis -->
            <div id="dynamic-fields" class="space-y-4">
                <!-- Fields untuk CloneBot (awalnya tersembunyi) -->
                <div id="clonebot-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Nomor Bot</label>
                        <input type="text" id="botNumber" name="botNumber" placeholder="628123456789" class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition placeholder:text-red-800 shadow-[0_0_5px_red]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Server</label>
                        <select id="server" name="server" class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition shadow-[0_0_5px_red]">
                            <option value="1" class="bg-black">Server 1</option>
                            <option value="2" class="bg-black">Server 2</option>
                            <option value="3" class="bg-black">Server 3</option>
                            <option value="4" class="bg-black">Server 4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Keluhan</label>
                        <textarea id="complaintClone" rows="4" placeholder="Tulis detail keluhan..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition resize-none placeholder:text-red-800 shadow-[0_0_5px_red]"></textarea>
                    </div>
                </div>

                <!-- Fields untuk SewaBot -->
                <div id="sewabot-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Link Group</label>
                        <input type="url" id="groupLink" name="groupLink" placeholder="https://t.me/..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition placeholder:text-red-800 shadow-[0_0_5px_red]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Keluhan</label>
                        <textarea id="complaintSewa" rows="4" placeholder="Tulis detail keluhan..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition resize-none placeholder:text-red-800 shadow-[0_0_5px_red]"></textarea>
                    </div>
                </div>

                <!-- Fields untuk Lainnya -->
                <div id="lainnya-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-red-400 mb-1 uppercase tracking-wider">Pesan / Keluhan</label>
                        <textarea id="complaintLainnya" rows="5" placeholder="Tulis pesan Anda..." class="w-full bg-black border-2 border-red-600 text-white rounded-xl p-3 focus:ring-2 focus:ring-red-500 focus:border-red-500 transition resize-none placeholder:text-red-800 shadow-[0_0_5px_red]"></textarea>
                    </div>
                </div>
            </div>

            <!-- Tombol Kirim -->
            <button type="submit" class="w-full bg-gradient-to-r from-red-700 to-red-900 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_red] hover:shadow-[0_0_30px_red] transform hover:scale-[1.02] transition duration-200 text-lg uppercase tracking-widest flex items-center justify-center gap-2 border border-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.5 3.5L2.5 10.5L8.5 13.5L13.5 21.5L20.5 3.5Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
                </svg>
                Kirim via WhatsApp
            </button>
        </form>

        <p class="text-xs text-center text-red-600/50 mt-6 relative z-10">* Data akan dikirim ke admin. Pastikan data benar.</p>
    </div>

    <script>
        (function() {
            const productSelect = document.getElementById('product');
            const clonebotFields = document.getElementById('clonebot-fields');
            const sewabotFields = document.getElementById('sewabot-fields');
            const lainnyaFields = document.getElementById('lainnya-fields');
            const form = document.getElementById('complaintForm');

            // Referensi input
            const botNumber = document.getElementById('botNumber');
            const server = document.getElementById('server');
            const complaintClone = document.getElementById('complaintClone');
            const groupLink = document.getElementById('groupLink');
            const complaintSewa = document.getElementById('complaintSewa');
            const complaintLainnya = document.getElementById('complaintLainnya');

            function toggleFields() {
                const selected = productSelect.value;

                // Sembunyikan semua
                clonebotFields.classList.add('hidden');
                sewabotFields.classList.add('hidden');
                lainnyaFields.classList.add('hidden');

                // Reset required
                botNumber.required = false;
                server.required = false;
                complaintClone.required = false;
                groupLink.required = false;
                complaintSewa.required = false;
                complaintLainnya.required = false;

                if (selected === 'clonebot') {
                    clonebotFields.classList.remove('hidden');
                    botNumber.required = true;
                    server.required = true;
                    complaintClone.required = true;
                } else if (selected === 'sewabot') {
                    sewabotFields.classList.remove('hidden');
                    groupLink.required = true;
                    complaintSewa.required = true;
                } else if (selected === 'lainnya') {
                    lainnyaFields.classList.remove('hidden');
                    complaintLainnya.required = true;
                }
            }

            // Event listener untuk perubahan produk
            productSelect.addEventListener('change', toggleFields);

            // Submit form
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const selected = productSelect.value;
                if (!selected) {
                    alert('Silakan pilih produk terlebih dahulu!');
                    return;
                }

                let message = '.owner';
                const now = new Date();
                const dateStr = now.toLocaleString('id-ID', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                if (selected === 'clonebot') {
                    const botVal = botNumber.value.trim();
                    const serverVal = server.value;
                    const complaintVal = complaintClone.value.trim();

                    if (!botVal || !complaintVal) {
                        alert('Harap isi nomor bot dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN CLONEBOT* ━━━`;
                    message += `\n🤖 *Nomor Bot* : ${botVal}`;
                    message += `\n🖥️ *Server*    : Server ${serverVal}`;
                    message += `\n📝 *Keluhan*   :\n_${complaintVal}_`;
                } 
                else if (selected === 'sewabot') {
                    const linkVal = groupLink.value.trim();
                    const complaintVal = complaintSewa.value.trim();

                    if (!linkVal || !complaintVal) {
                        alert('Harap isi link group dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN SEWABOT* ━━━`;
                    message += `\n🔗 *Link Group* : ${linkVal}`;
                    message += `\n📝 *Keluhan*    :\n_${complaintVal}_`;
                } 
                else if (selected === 'lainnya') {
                    const complaintVal = complaintLainnya.value.trim();

                    if (!complaintVal) {
                        alert('Harap isi keluhan/pesan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN LAINNYA* ━━━`;
                    message += `\n📝 *Isi Laporan* :\n_${complaintVal}_`;
                }

                message += `\n\n📅 *Dilaporkan pada* : ${dateStr}`;
                message += `\n━━━━━━━━━━━━━━━━━`;

                const encodedMessage = encodeURIComponent(message);
                const phoneNumber = '6285648640715';
                const waUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;
                window.open(waUrl, '_blank');
            });

            // Optional: nonaktifkan submit jika produk belum dipilih (sudah dicegah oleh alert di atas)
        })();
    </script>
</body>
</html>
