<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keluhan Customer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi halus untuk transisi field */
        .field-transition {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl w-full max-w-2xl p-6 md:p-8 border border-white/50">
        <!-- Header dengan ikon -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-blue-100 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Laporan Keluhan</h1>
            <p class="text-gray-500 mt-1">Sampaikan masalahmu, kami siap membantu</p>
        </div>

        <form id="complaintForm" class="space-y-5">
            <!-- Dropdown Produk -->
            <div class="relative">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Pilih Produk</label>
                <select id="product" name="product" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition appearance-none bg-white">
                    <option value="clonebot" selected>CloneBot</option>
                    <option value="sewabot">SewaBot</option>
                </select>
                <div class="pointer-events-none absolute right-3 top-10 text-gray-400">
                    ▼
                </div>
            </div>

            <!-- Container Field Dinamis -->
            <div id="dynamic-fields" class="space-y-4">
                <!-- Fields untuk CloneBot -->
                <div id="clonebot-fields" class="space-y-4 field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Nomor Bot Bermasalah</label>
                        <input type="text" id="botNumber" name="botNumber" placeholder="Contoh: 628123456789" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Pilih Server</label>
                        <select id="server" name="server" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition">
                            <option value="1">Server 1</option>
                            <option value="2">Server 2</option>
                            <option value="3">Server 3</option>
                            <option value="4">Server 4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Keluhan</label>
                        <textarea id="complaintClone" rows="4" placeholder="Tulis keluhan Anda dengan detail..." class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition resize-none"></textarea>
                    </div>
                </div>

                <!-- Fields untuk SewaBot (awalnya tersembunyi) -->
                <div id="sewabot-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Link Group</label>
                        <input type="url" id="groupLink" name="groupLink" placeholder="https://t.me/..." class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Keluhan</label>
                        <textarea id="complaintSewa" rows="4" placeholder="Tulis keluhan Anda dengan detail..." class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition resize-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Tombol Kirim -->
            <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition duration-200 text-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.5 3.5L2.5 10.5L8.5 13.5L13.5 21.5L20.5 3.5Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
                </svg>
                Kirim Laporan via WhatsApp
            </button>
        </form>

        <p class="text-xs text-center text-gray-400 mt-6">* Data akan dikirim ke admin via WhatsApp. Pastikan data sudah benar.</p>
    </div>

    <script>
        (function() {
            // Ambil elemen DOM
            const productSelect = document.getElementById('product');
            const clonebotFields = document.getElementById('clonebot-fields');
            const sewabotFields = document.getElementById('sewabot-fields');
            const form = document.getElementById('complaintForm');

            // Referensi input
            const botNumber = document.getElementById('botNumber');
            const server = document.getElementById('server');
            const complaintClone = document.getElementById('complaintClone');
            const groupLink = document.getElementById('groupLink');
            const complaintSewa = document.getElementById('complaintSewa');

            // Fungsi toggle field berdasarkan produk yang dipilih
            function toggleFields() {
                const selected = productSelect.value;

                if (selected === 'clonebot') {
                    // Tampilkan CloneBot, sembunyikan SewaBot
                    clonebotFields.classList.remove('hidden');
                    sewabotFields.classList.add('hidden');

                    // Set required untuk field CloneBot
                    botNumber.required = true;
                    server.required = true;
                    complaintClone.required = true;

                    // Hapus required dari field SewaBot
                    groupLink.required = false;
                    complaintSewa.required = false;
                } else {
                    // Tampilkan SewaBot, sembunyikan CloneBot
                    clonebotFields.classList.add('hidden');
                    sewabotFields.classList.remove('hidden');

                    // Set required untuk field SewaBot
                    groupLink.required = true;
                    complaintSewa.required = true;

                    // Hapus required dari field CloneBot
                    botNumber.required = false;
                    server.required = false;
                    complaintClone.required = false;
                }
            }

            // Panggil pertama kali untuk set state awal (CloneBot aktif)
            toggleFields();

            // Event listener saat produk diubah
            productSelect.addEventListener('change', toggleFields);

            // Handle submit form
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const selected = productSelect.value;
                let message = '.owner'; // Awalan sesuai instruksi

                // Ambil tanggal dan waktu sekarang
                const now = new Date();
                const dateStr = now.toLocaleString('id-ID', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                if (selected === 'clonebot') {
                    const botVal = botNumber.value.trim();
                    const serverVal = server.value;
                    const complaintVal = complaintClone.value.trim();

                    // Validasi sederhana (selain required HTML5)
                    if (!botVal || !complaintVal) {
                        alert('Harap isi nomor bot dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN CLONEBOT* ━━━`;
                    message += `\n🤖 *Nomor Bot* : ${botVal}`;
                    message += `\n🖥️ *Server*    : Server ${serverVal}`;
                    message += `\n📝 *Keluhan*   :\n_${complaintVal}_`;
                } else {
                    const linkVal = groupLink.value.trim();
                    const complaintVal = complaintSewa.value.trim();

                    if (!linkVal || !complaintVal) {
                        alert('Harap isi link group dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN SEWABOT* ━━━`;
                    message += `\n🔗 *Link Group* : ${linkVal}`;
                    message += `\n📝 *Keluhan*    :\n_${complaintVal}_`;
                }

                // Tambahkan footer laporan
                message += `\n\n📅 *Dilaporkan pada* : ${dateStr}`;
                message += `\n━━━━━━━━━━━━━━━━━`;

                // Encode pesan untuk URL
                const encodedMessage = encodeURIComponent(message);

                // Nomor tujuan (tanpa tanda + atau spasi)
                const phoneNumber = '6285648640715';

                // Buat URL WhatsApp (menggunakan api.whatsapp.com agar lebih kompatibel)
                const waUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;

                // Buka di tab baru
                window.open(waUrl, '_blank');
            });
        })();
    </script>
</body>
</html>
