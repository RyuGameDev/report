<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keluhan · CloneBot & SewaBot</title>
    <!-- Tailwind via CDN + tambahan utility -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font awesome untuk ikon (opsional, mempercantik) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom glassmorphism dan efek glow */
        body {
            background: radial-gradient(circle at 10% 20%, #1a0b2e, #0b0719 90%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(20, 15, 40, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 115, 230, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 70, 200, 0.2) inset, 0 0 20px rgba(180, 70, 255, 0.3);
        }
        .glow-input {
            transition: all 0.2s ease;
        }
        .glow-input:focus {
            border-color: #f472b6 !important;
            box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.3), 0 0 15px #c084fc;
        }
        .neon-button {
            background: linear-gradient(135deg, #f43f5e, #e11d48, #a21caf);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .neon-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px #f472b6, 0 0 5px #c084fc;
        }
        select, input, textarea {
            color-scheme: dark;
        }
        /* animated background grain (opsional) */
        .bg-grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
            pointer-events: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-5 relative">
    <!-- overlay grain -->
    <div class="fixed inset-0 bg-grain opacity-40 pointer-events-none z-0"></div>
    
    <div class="relative z-10 w-full max-w-2xl">
        <!-- header dengan aksen -->
        <div class="text-center mb-6">
            <div class="inline-block p-3 rounded-full bg-gradient-to-r from-pink-600/30 to-purple-600/30 backdrop-blur-sm border border-pink-400/30 shadow-lg mb-2">
                <i class="fas fa-bug text-4xl text-pink-200 drop-shadow-[0_0_8px_#f0f]"></i>
            </div>
            <h1 class="text-4xl font-black bg-gradient-to-r from-pink-300 via-fuchsia-300 to-purple-300 bg-clip-text text-transparent drop-shadow-lg">LAPORAN KELUHAN</h1>
            <p class="text-fuchsia-200/70 text-sm tracking-wider">✨ clonebot · sewabot ✨</p>
        </div>

        <!-- CARD FORM -->
        <div class="glass-card rounded-3xl p-8 md:p-10 border border-pink-500/40 shadow-2xl">
            <form id="complaintForm" onsubmit="return false;">
                <!-- dropdown produk -->
                <div class="mb-8">
                    <label class="block text-fuchsia-200 text-sm font-bold mb-2 tracking-wider"><i class="fas fa-box mr-2 text-pink-300"></i>PILIH PRODUK</label>
                    <select id="productSelect" name="produk" required class="w-full p-4 rounded-2xl bg-white/10 border border-pink-400/50 text-white placeholder-pink-200/60 outline-none glow-input appearance-none cursor-pointer" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%23f9a8d4%22><path stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22M19 9l-7 7-7-7%22 /></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.5rem;">
                        <option value="" selected disabled class="bg-gray-800 text-white/70">-- pilih produk --</option>
                        <option value="clonebot" class="bg-gray-800 text-white">🤖 CloneBot</option>
                        <option value="sewabot" class="bg-gray-800 text-white">📦 SewaBot</option>
                    </select>
                </div>

                <!-- container khusus clonebot (muncul jika clonebot dipilih) -->
                <div id="clonebotFields" class="space-y-6 hidden transition-all duration-300">
                    <div>
                        <label class="block text-fuchsia-200 text-sm font-bold mb-2"><i class="fas fa-robot mr-2 text-pink-300"></i>NOMOR BOT BERMASALAH</label>
                        <input type="text" id="botNumber" placeholder="cth: 6281234567890" class="w-full p-4 rounded-2xl bg-white/10 border border-pink-400/40 text-white placeholder-pink-300/50 outline-none glow-input">
                    </div>
                    <div>
                        <label class="block text-fuchsia-200 text-sm font-bold mb-2"><i class="fas fa-server mr-2 text-pink-300"></i>PILIH SERVER</label>
                        <select id="serverSelect" class="w-full p-4 rounded-2xl bg-white/10 border border-pink-400/40 text-white outline-none glow-input">
                            <option value="" disabled selected class="bg-gray-800">-- server --</option>
                            <option value="Server 1" class="bg-gray-800">Server 1</option>
                            <option value="Server 2" class="bg-gray-800">Server 2</option>
                            <option value="Server 3" class="bg-gray-800">Server 3</option>
                            <option value="Server 4" class="bg-gray-800">Server 4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-fuchsia-200 text-sm font-bold mb-2"><i class="fas fa-comment-dots mr-2 text-pink-300"></i>KELUHAN / KENDALA</label>
                        <textarea id="clonebotComplaint" rows="4" placeholder="Jelaskan masalah yang terjadi..." class="w-full p-4 rounded-2xl bg-white/10 border border-pink-400/40 text-white placeholder-pink-300/50 outline-none glow-input resize-none"></textarea>
                    </div>
                </div>

                <!-- container khusus sewabot (muncul jika sewabot dipilih) -->
                <div id="sewabotFields" class="space-y-6 hidden transition-all duration-300">
                    <div>
                        <label class="block text-fuchsia-200 text-sm font-bold mb-2"><i class="fas fa-link mr-2 text-pink-300"></i>LINK GROUP</label>
                        <input type="url" id="groupLink" placeholder="https://chat.whatsapp.com/..." class="w-full p-4 rounded-2xl bg-white/10 border border-pink-400/40 text-white placeholder-pink-300/50 outline-none glow-input">
                    </div>
                    <div>
                        <label class="block text-fuchsia-200 text-sm font-bold mb-2"><i class="fas fa-comment-dots mr-2 text-pink-300"></i>KELUHAN / KENDALA</label>
                        <textarea id="sewabotComplaint" rows="4" placeholder="Jelaskan masalah yang terjadi..." class="w-full p-4 rounded-2xl bg-white/10 border border-pink-400/40 text-white placeholder-pink-300/50 outline-none glow-input resize-none"></textarea>
                    </div>
                </div>

                <!-- pesan error/validasi sederhana (optional) -->
                <div id="validationMessage" class="mt-4 text-pink-300 text-sm"></div>

                <!-- tombol submit -->
                <div class="mt-10 text-center">
                    <button type="button" id="submitBtn" class="neon-button w-full md:w-auto px-12 py-5 rounded-2xl text-white font-black text-xl tracking-widest shadow-2xl flex items-center justify-center gap-3 mx-auto">
                        <i class="fab fa-whatsapp text-2xl"></i> KIRIM LAPORAN
                    </button>
                    <p class="text-xs text-fuchsia-300/50 mt-4">* akan diarahkan ke WhatsApp .owner</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // elemen2 penting
            const productSelect = document.getElementById('productSelect');
            const clonebotDiv = document.getElementById('clonebotFields');
            const sewabotDiv = document.getElementById('sewabotFields');
            const submitBtn = document.getElementById('submitBtn');
            const validationMsg = document.getElementById('validationMessage');

            // field khusus clonebot
            const botNumber = document.getElementById('botNumber');
            const serverSelect = document.getElementById('serverSelect');
            const clonebotComplaint = document.getElementById('clonebotComplaint');

            // field khusus sewabot
            const groupLink = document.getElementById('groupLink');
            const sewabotComplaint = document.getElementById('sewabotComplaint');

            // fungsi untuk reset/show field sesuai produk
            function toggleFields() {
                const selected = productSelect.value;
                // sembunyikan kedua dulu
                clonebotDiv.classList.add('hidden');
                sewabotDiv.classList.add('hidden');
                
                if (selected === 'clonebot') {
                    clonebotDiv.classList.remove('hidden');
                } else if (selected === 'sewabot') {
                    sewabotDiv.classList.remove('hidden');
                }
                // kosongkan pesan validasi
                validationMsg.innerText = '';
            }

            // panggil saat halaman dimuat (default hidden)
            toggleFields();

            // event change produk
            productSelect.addEventListener('change', toggleFields);

            // fungsi bikin teks whatsapp
            function composeWhatsAppMessage() {
                const produk = productSelect.value;
                if (!produk) {
                    validationMsg.innerText = '⚠️ Silakan pilih produk terlebih dahulu.';
                    return null;
                }

                let message = '.owner';  // diawali .owner
                message += `\nProduk: ${produk === 'clonebot' ? 'CloneBot' : 'SewaBot'}`;

                // validasi dan ambil data sesuai produk
                if (produk === 'clonebot') {
                    const bot = botNumber.value.trim();
                    const server = serverSelect.value;
                    const keluhan = clonebotComplaint.value.trim();

                    if (!bot) {
                        validationMsg.innerText = '⚠️ Nomor bot harus diisi.';
                        return null;
                    }
                    if (!server) {
                        validationMsg.innerText = '⚠️ Pilih server terlebih dahulu.';
                        return null;
                    }
                    if (!keluhan) {
                        validationMsg.innerText = '⚠️ Kolom keluhan tidak boleh kosong.';
                        return null;
                    }

                    message += `\nNomor Bot: ${bot}`;
                    message += `\nServer: ${server}`;
                    message += `\nKeluhan: ${keluhan}`;

                } else if (produk === 'sewabot') {
                    const link = groupLink.value.trim();
                    const keluhan = sewabotComplaint.value.trim();

                    if (!link) {
                        validationMsg.innerText = '⚠️ Link group harus diisi.';
                        return null;
                    }
                    if (!keluhan) {
                        validationMsg.innerText = '⚠️ Kolom keluhan tidak boleh kosong.';
                        return null;
                    }

                    message += `\nLink Group: ${link}`;
                    message += `\nKeluhan: ${keluhan}`;
                }

                return message;
            }

            // event tombol submit
            submitBtn.addEventListener('click', function() {
                const message = composeWhatsAppMessage();
                if (!message) return;  // validasi gagal, sudah di-set

                // encode pesan untuk URL
                const encodedMessage = encodeURIComponent(message);
                const phoneNumber = '6285648640715';  // tanpa +
                const waURL = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

                // redirect ke whatsapp
                window.location.href = waURL;
            });

            // opsional: enter di form tidak melakukan apa2 (karena onsubmit false)
            // tambahan: hapus pesan validasi saat user mengetik ulang di field?
            const allFields = [botNumber, serverSelect, clonebotComplaint, groupLink, sewabotComplaint];
            allFields.forEach(field => {
                if (field) {
                    field.addEventListener('input', function() {
                        validationMsg.innerText = '';
                    });
                    field.addEventListener('change', function() {
                        validationMsg.innerText = '';
                    });
                }
            });
            productSelect.addEventListener('change', function() {
                validationMsg.innerText = '';
            });
        })();
    </script>

    <!-- catatan: validasi hanya front-end, pastikan nomor tujuan benar -->
    <!-- untuk tampilan lebih maksimal, tambahkan meta viewport sudah ada -->
</body>
</html>
