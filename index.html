<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keluhan - Teknologi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efek glow dan transisi */
        .glow-border:focus {
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.3);
        }
        .glow-button:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }
        /* Background dengan pattern garis halus */
        body {
            background: radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.05) 0%, transparent 30%),
                        linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-mono">

    <div class="bg-gray-900/90 backdrop-blur-sm border border-cyan-500/30 rounded-3xl shadow-2xl shadow-cyan-500/20 w-full max-w-2xl p-6 md:p-8">
        <!-- Header dengan ikon teknologi -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-cyan-900/50 border border-cyan-400 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-400">LAPORAN KELUHAN</h1>
            <p class="text-cyan-600 mt-1 text-sm">sistem pelaporan berbasis teknologi</p>
        </div>

        <form id="complaintForm" class="space-y-5">
            <!-- Dropdown Produk dengan opsi Lainnya -->
            <div class="relative">
                <label class="block text-sm font-semibold text-cyan-300 mb-1 tracking-wider">PRODUK</label>
                <select id="product" name="product" class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition appearance-none glow-border">
                    <option value="clonebot" class="bg-gray-800">CloneBot</option>
                    <option value="sewabot" class="bg-gray-800">SewaBot</option>
                    <option value="others" class="bg-gray-800">Lainnya</option>
                </select>
                <div class="pointer-events-none absolute right-3 top-10 text-cyan-500">
                    ▼
                </div>
            </div>

            <!-- Container Field Dinamis -->
            <div id="dynamic-fields" class="space-y-4">
                <!-- Fields untuk CloneBot -->
                <div id="clonebot-fields" class="space-y-4 field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-cyan-300 mb-1">NOMOR BOT</label>
                        <input type="text" id="botNumber" placeholder="628123456789" class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 placeholder-cyan-700 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition glow-border">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-cyan-300 mb-1">SERVER</label>
                        <select id="server" name="server" class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition">
                            <option value="1" class="bg-gray-800">Server 1</option>
                            <option value="2" class="bg-gray-800">Server 2</option>
                            <option value="3" class="bg-gray-800">Server 3</option>
                            <option value="4" class="bg-gray-800">Server 4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-cyan-300 mb-1">KELUHAN</label>
                        <textarea id="complaintClone" rows="4" placeholder="Tulis keluhan detail..." class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 placeholder-cyan-700 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition resize-none glow-border"></textarea>
                    </div>
                </div>

                <!-- Fields untuk SewaBot (awalnya tersembunyi) -->
                <div id="sewabot-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-cyan-300 mb-1">LINK GROUP</label>
                        <input type="url" id="groupLink" placeholder="https://t.me/..." class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 placeholder-cyan-700 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition glow-border">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-cyan-300 mb-1">KELUHAN</label>
                        <textarea id="complaintSewa" rows="4" placeholder="Tulis keluhan detail..." class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 placeholder-cyan-700 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition resize-none glow-border"></textarea>
                    </div>
                </div>

                <!-- Fields untuk Lainnya (hanya keluhan) -->
                <div id="others-fields" class="space-y-4 hidden field-transition">
                    <div>
                        <label class="block text-sm font-semibold text-cyan-300 mb-1">PESAN / KELUHAN</label>
                        <textarea id="complaintOthers" rows="5" placeholder="Tulis pesan atau keluhan Anda..." class="w-full bg-gray-800 border border-cyan-500/50 rounded-xl p-3 text-cyan-100 placeholder-cyan-700 focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition resize-none glow-border"></textarea>
                    </div>
                </div>
            </div>

            <!-- Tombol Kirim dengan efek neon -->
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-cyan-500/50 transform hover:scale-[1.02] transition duration-200 text-lg flex items-center justify-center gap-2 glow-button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.5 3.5L2.5 10.5L8.5 13.5L13.5 21.5L20.5 3.5Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
                </svg>
                KIRIM LAPORAN VIA WHATSAPP
            </button>
        </form>

        <p class="text-xs text-center text-cyan-700 mt-6">* Data akan dikirim ke admin. Pastikan data sudah benar.</p>
    </div>

    <script>
        (function() {
            // Ambil elemen DOM
            const productSelect = document.getElementById('product');
            const clonebotFields = document.getElementById('clonebot-fields');
            const sewabotFields = document.getElementById('sewabot-fields');
            const othersFields = document.getElementById('others-fields');
            const form = document.getElementById('complaintForm');

            // Referensi input
            const botNumber = document.getElementById('botNumber');
            const server = document.getElementById('server');
            const complaintClone = document.getElementById('complaintClone');
            const groupLink = document.getElementById('groupLink');
            const complaintSewa = document.getElementById('complaintSewa');
            const complaintOthers = document.getElementById('complaintOthers');

            // Fungsi toggle field berdasarkan produk yang dipilih
            function toggleFields() {
                const selected = productSelect.value;

                // Sembunyikan semua grup field terlebih dahulu
                clonebotFields.classList.add('hidden');
                sewabotFields.classList.add('hidden');
                othersFields.classList.add('hidden');

                // Nonaktifkan required semua field
                botNumber.required = false;
                server.required = false;
                complaintClone.required = false;
                groupLink.required = false;
                complaintSewa.required = false;
                complaintOthers.required = false;

                if (selected === 'clonebot') {
                    clonebotFields.classList.remove('hidden');
                    botNumber.required = true;
                    server.required = true;
                    complaintClone.required = true;
                } else if (selected === 'sewabot') {
                    sewabotFields.classList.remove('hidden');
                    groupLink.required = true;
                    complaintSewa.required = true;
                } else { // others
                    othersFields.classList.remove('hidden');
                    complaintOthers.required = true;
                }
            }

            // Panggil pertama kali untuk set state awal (CloneBot)
            toggleFields();

            // Event listener saat produk diubah
            productSelect.addEventListener('change', toggleFields);

            // Handle submit form
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const selected = productSelect.value;
                let message = '.owner'; // Awalan sesuai instruksi

                // Ambil tanggal dan waktu sekarang
                const now = new Date();
                const dateStr = now.toLocaleString('id-ID', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                if (selected === 'clonebot') {
                    const botVal = botNumber.value.trim();
                    const serverVal = server.value;
                    const complaintVal = complaintClone.value.trim();

                    if (!botVal || !complaintVal) {
                        alert('Harap isi nomor bot dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN CLONEBOT* ━━━`;
                    message += `\n🤖 *Nomor Bot* : ${botVal}`;
                    message += `\n🖥️ *Server*    : Server ${serverVal}`;
                    message += `\n📝 *Keluhan*   :\n_${complaintVal}_`;
                } 
                else if (selected === 'sewabot') {
                    const linkVal = groupLink.value.trim();
                    const complaintVal = complaintSewa.value.trim();

                    if (!linkVal || !complaintVal) {
                        alert('Harap isi link group dan keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN SEWABOT* ━━━`;
                    message += `\n🔗 *Link Group* : ${linkVal}`;
                    message += `\n📝 *Keluhan*    :\n_${complaintVal}_`;
                } 
                else { // others
                    const othersVal = complaintOthers.value.trim();

                    if (!othersVal) {
                        alert('Harap isi pesan/keluhan!');
                        return;
                    }

                    message += `\n\n━━━ *LAPORAN LAINNYA* ━━━`;
                    message += `\n📝 *Pesan* :\n_${othersVal}_`;
                }

                // Tambahkan footer laporan
                message += `\n\n📅 *Dilaporkan pada* : ${dateStr}`;
                message += `\n━━━━━━━━━━━━━━━━━`;

                // Encode pesan untuk URL
                const encodedMessage = encodeURIComponent(message);

                // Nomor tujuan
                const phoneNumber = '6285648640715';

                // Buat URL WhatsApp
                const waUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;

                // Buka di tab baru
                window.open(waUrl, '_blank');
            });
        })();
    </script>
</body>
</html>
