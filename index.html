<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Keluhan · Customer Care</title>
  <!-- Tailwind via CDN + basic inter font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    /* smooth fade for field groups */
    .field-group {
      transition: opacity 0.2s ease-in-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-5">

  <!-- glassmorphism card -->
  <div class="w-full max-w-2xl bg-white/70 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/40 p-6 md:p-8">
    
    <!-- header with icon -->
    <div class="flex items-center gap-3 mb-6">
      <div class="p-3 bg-indigo-100 rounded-2xl shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Laporkan keluhan</h1>
    </div>
    
    <p class="text-gray-600 mb-7 ml-1 border-l-4 border-indigo-300 pl-4 italic">Pilih produk yang kamu gunakan, isi sesuai formulir, dan kirim langsung ke tim support.</p>

    <!-- FORM CONTAINER -->
    <form id="reportForm" class="space-y-6">
      
      <!-- DROPDOWN PRODUK (harus dipilih manual) -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1 ml-1" for="produk">📦 Pilih produk dulu ya</label>
        <select id="produk" name="produk" class="w-full px-5 py-3.5 rounded-xl border border-gray-200 bg-white/70 shadow-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none transition">
          <option value="" disabled selected>— Pilih salah satu —</option>
          <option value="clonebot">🤖 Clonebot</option>
          <option value="sewabot">📢 Sewabot</option>
          <option value="lainnya">✨ Lainnya (pesan bebas)</option>
        </select>
      </div>

      <!-- DYNAMIC FIELDS (semua hidden dulu) -->
      
      <!-- CLONEBOT FIELDS -->
      <div id="clonebotFields" class="field-group space-y-4 hidden">
        <div class="border-t border-indigo-100 my-4"></div>
        <h3 class="font-medium text-indigo-800 flex items-center gap-1"><span class="text-lg">🤖</span> Detail Clonebot</h3>
        
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="nomorBot">🆔 Nomor bot bermasalah</label>
          <input type="text" id="nomorBot" placeholder="contoh: 6281234567890" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 focus:ring-2 focus:ring-indigo-200 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="serverSelect">🌐 Pilih server (1-4)</label>
          <select id="serverSelect" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 focus:ring-2 focus:ring-indigo-200 outline-none">
            <option value="" disabled selected>— Pilih server —</option>
            <option value="1">Server 1</option>
            <option value="2">Server 2</option>
            <option value="3">Server 3</option>
            <option value="4">Server 4</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="keluhanClone">📝 Keluhan / kendala</label>
          <textarea id="keluhanClone" rows="3" placeholder="Jelaskan masalahnya sedetail mungkin ..." class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 focus:ring-2 focus:ring-indigo-200 outline-none resize-none"></textarea>
        </div>
      </div>

      <!-- SEWABOT FIELDS -->
      <div id="sewabotFields" class="field-group space-y-4 hidden">
        <div class="border-t border-indigo-100 my-4"></div>
        <h3 class="font-medium text-indigo-800 flex items-center gap-1"><span class="text-lg">📢</span> Detail Sewabot</h3>
        
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="linkGroup">🔗 Link grup / channel</label>
          <input type="url" id="linkGroup" placeholder="https://chat.whatsapp.com/xxx" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 focus:ring-2 focus:ring-indigo-200 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="keluhanSewa">📝 Keluhan / permintaan</label>
          <textarea id="keluhanSewa" rows="3" placeholder="Ceritakan masalah atau kendala sewabot ..." class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 focus:ring-2 focus:ring-indigo-200 outline-none resize-none"></textarea>
        </div>
      </div>

      <!-- LAINNYA FIELDS (hanya textarea) -->
      <div id="lainnyaFields" class="field-group space-y-4 hidden">
        <div class="border-t border-indigo-100 my-4"></div>
        <h3 class="font-medium text-indigo-800 flex items-center gap-1"><span class="text-lg">✨</span> Pesan bebas</h3>
        
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="pesanLain">💬 Tulis keluhan / pesan</label>
          <textarea id="pesanLain" rows="4" placeholder="Silakan sampaikan apapun yang ingin dilaporkan ..." class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 focus:ring-2 focus:ring-indigo-200 outline-none resize-none"></textarea>
        </div>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="button" id="submitBtn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-5 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center gap-2 text-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        Kirim laporan
      </button>
    </form>
  </div>

  <script>
    (function() {
      // ambil elemen penting
      const produkSelect = document.getElementById('produk');
      const clonebotDiv = document.getElementById('clonebotFields');
      const sewabotDiv = document.getElementById('sewabotFields');
      const lainnyaDiv = document.getElementById('lainnyaFields');

      // field input untuk masing2 opsi (untuk validasi & ambil value)
      const nomorBot = document.getElementById('nomorBot');
      const serverSelect = document.getElementById('serverSelect');
      const keluhanClone = document.getElementById('keluhanClone');

      const linkGroup = document.getElementById('linkGroup');
      const keluhanSewa = document.getElementById('keluhanSewa');

      const pesanLain = document.getElementById('pesanLain');

      // === FUNGSI MENAMPILKAN GROUP SESUAI PILIHAN PRODUK ===
      function tampilkanGroupBerdasarkanProduk() {
        const pilihan = produkSelect.value;

        // sembunyikan semua grup
        clonebotDiv.classList.add('hidden');
        sewabotDiv.classList.add('hidden');
        lainnyaDiv.classList.add('hidden');

        // tampilkan sesuai pilihan
        if (pilihan === 'clonebot') {
          clonebotDiv.classList.remove('hidden');
        } else if (pilihan === 'sewabot') {
          sewabotDiv.classList.remove('hidden');
        } else if (pilihan === 'lainnya') {
          lainnyaDiv.classList.remove('hidden');
        }
        // jika pilihan kosong (placeholder) : semua tetap hidden
      }

      // panggil saat halaman dimuat (default semua hidden) dan setiap kali ganti produk
      produkSelect.addEventListener('change', tampilkanGroupBerdasarkanProduk);
      tampilkanGroupBerdasarkanProduk(); // inisialisasi

      // === HANDLE SUBMIT (KIRIM KE WHATSAPP) ===
      document.getElementById('submitBtn').addEventListener('click', function(e) {
        e.preventDefault();

        const produk = produkSelect.value;
        if (!produk) {
          alert('Silakan pilih produk terlebih dahulu.');
          return;
        }

        let pesan = '.owner \n';   // sesuai permintaan: diawali .owner
        pesan += 'Produk: ';

        // VARIABEL UNTUK VALIDASI
        if (produk === 'clonebot') {
          pesan += 'Clonebot\n';
          const botVal = nomorBot.value.trim();
          const serverVal = serverSelect.value;
          const keluhanVal = keluhanClone.value.trim();

          if (!botVal) {
            alert('Nomor bot harus diisi.');
            return;
          }
          if (!serverVal) {
            alert('Pilih server terlebih dahulu.');
            return;
          }
          if (!keluhanVal) {
            alert('Kolom keluhan harus diisi.');
            return;
          }

          pesan += 'Nomor Bot: ' + botVal + '\n';
          pesan += 'Server: Server ' + serverVal + '\n';
          pesan += 'Keluhan: ' + keluhanVal;

        } else if (produk === 'sewabot') {
          pesan += 'Sewabot\n';
          const linkVal = linkGroup.value.trim();
          const keluhanVal = keluhanSewa.value.trim();

          if (!linkVal) {
            alert('Link grup harus diisi.');
            return;
          }
          if (!keluhanVal) {
            alert('Kolom keluhan harus diisi.');
            return;
          }

          pesan += 'Link Group: ' + linkVal + '\n';
          pesan += 'Keluhan: ' + keluhanVal;

        } else if (produk === 'lainnya') {
          pesan += 'Lainnya\n';
          const pesanVal = pesanLain.value.trim();

          if (!pesanVal) {
            alert('Pesan/keluhan tidak boleh kosong.');
            return;
          }

          pesan += 'Pesan: ' + pesanVal;
        }

        // encode dan kirim ke WA
        const noTujuan = '6285648640715';  // tanpa '+'
        const urlWA = `https://wa.me/${noTujuan}?text=${encodeURIComponent(pesan)}`;
        
        // buka tab baru
        window.open(urlWA, '_blank');
      });

      // sedikit sentuhan: kosongin alert styling (optional) — biar gak reload
    })();
  </script>

  <!-- optional: tambahan smooth dan clear form (tidak perlu reset, biar user isi lagi) -->
</body>
</html>
